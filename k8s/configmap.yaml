apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflow-config
  namespace: cloudflow
data:
  # Database
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "cloudflow"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # App
  SPRING_PROFILES_ACTIVE: "k8s"
  JAVA_OPTS: "-Xms512m -Xmx1024m"

  # Rate limiting
  RATE_LIMIT_REQUESTS_PER_MINUTE: "100"