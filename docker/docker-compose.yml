version: '3.8'

services:

  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cloudflow-postgres
    environment:
      POSTGRES_DB: cloudflow
      POSTGRES_USER: cloudflow_user
      POSTGRES_PASSWORD: cloudflow_pass
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cloudflow_user']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper (required by Kafka) ───────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: cloudflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ─── Apache Kafka ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: cloudflow-kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudflow-redis
    command: redis-server --requirepass redispass
    ports:
      - '6379:6379'

  # ─── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudflow-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # ─── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: cloudflow-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  postgres_data: