name: CD — Deploy (Manual)

on:
  workflow_run:
    workflows: [ "CI — Build, Test, Push" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  notify:
    name: Deployment Ready
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Image ready for deployment
        run: |
          SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "✅ Docker image ready: ${{ secrets.DOCKERHUB_USERNAME }}/cloudflow:sha-${SHA}"
          echo ""
          echo "To deploy locally, run:"
          echo "  kubectl set image deployment/cloudflow-app cloudflow=${{ secrets.DOCKERHUB_USERNAME }}/cloudflow:sha-${SHA} -n cloudflow"
          echo "  kubectl rollout status deployment/cloudflow-app -n cloudflow"