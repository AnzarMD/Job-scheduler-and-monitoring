name: CI — Build, Test, Push

# Triggers: every push to any branch, and every PR targeting main
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

env:
  # Docker Hub image name — change YOUR_DOCKERHUB_USERNAME
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cloudflow

jobs:

  # ─────────────────────────────────────────
  # Job 1: Unit Tests (fast, no Docker needed)
  # ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven       # Cache ~/.m2 between runs — speeds up subsequent builds

      - name: Make mvnw executable
        run: chmod +x mvnw
      - name: Run unit tests
        run: |
          ./mvnw test \
            -Dtest="CronValidatorTest,AuthServiceTest,JobServiceTest" \
            -DfailIfNoTests=false \
            -Dnet.bytebuddy.experimental=true \
            -XX:+EnableDynamicAgentLoading

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()           # Upload even if tests fail — so you can inspect failures
        with:
          name: unit-test-results
          path: target/surefire-reports/

  # ─────────────────────────────────────────
  # Job 2: Build JAR
  # ─────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: unit-tests          # Only build if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build JAR (skip tests — already ran)
        run: ./mvnw clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflow-jar
          path: target/*.jar
          retention-days: 1    # Keep for 1 day — used by Docker build job

  # ─────────────────────────────────────────
  # Job 3: Build & Push Docker Image
  # Only runs on pushes to main (not on PRs)
  # ─────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflow-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables layer caching and multi-platform builds

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
#            Tag with git SHA (e.g. sha-abc1234) — immutable, traceable
            type=sha,prefix=sha-
            # Tag with branch name (e.g. main)
            type=ref,event=branch
            # Tag as 'latest' only on main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache for Docker layers — huge speed improvement
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "✅ Image pushed:"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build-push.outputs.digest }}"